services:
  # PostgreSQL Database
  - type: pserv
    name: pathforge-db
    plan: free
    ipAddress: private
    postgresVersion: 15
    env:
      POSTGRES_DB: pathforge
      POSTGRES_USER: pathforge
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

  # ML Service (Python/FastAPI)
  - type: web
    name: pathforge-ml
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8001
    rootDir: ml
    envVars:
      - key: ML_ENV
        value: production
      - key: HF_TOKEN
        sync: false
    healthCheckPath: /health
    healthCheckTimeout: 30

  # Backend Service (Python/FastAPI)
  - type: web
    name: pathforge-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pathforge-db
          property: connectionString
      - key: ML_SERVICE_URL
        fromService:
          name: pathforge-ml
          property: renderURL
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        value: "*.render.com"
      - key: ALLOW_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
    healthCheckPath: /health
    healthCheckTimeout: 30
    depends_on:
      - pathforge-db

  # Frontend (Next.js)
  - type: web
    name: pathforge-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: pathforge-backend
          property: renderURL
      - key: NEXT_PUBLIC_EXTERNAL_QUIZ_URL
        value: https://quiz.example.com/quiz
    healthCheckPath: /
    healthCheckTimeout: 30
    depends_on:
      - pathforge-backend
