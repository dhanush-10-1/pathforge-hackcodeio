version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: pathforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pathforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pathforge123}
      POSTGRES_DB: ${POSTGRES_DB:-pathforge}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  ml:
    build: ./ml
    container_name: pathforge-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ML_ENV=${ML_ENV:-development}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./ml:/app
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: pathforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pathforge}:${POSTGRES_PASSWORD:-pathforge123}@postgres:5432/${POSTGRES_DB:-pathforge}
      - ML_SERVICE_URL=http://ml:8001
      - JWT_SECRET=${JWT_SECRET:-hackathon-secret-change-me}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: pathforge-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8900:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
